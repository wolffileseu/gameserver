name: Build and Push Docker Image

on:
  push:
    branches:
      - main
  schedule:
    # Rebuild weekly to keep base packages up to date
    - cron: "0 4 * * 1"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        variant:
          - name: latest
            dockerfile: Dockerfile
            extra_tag: debian-bookworm
          - name: wine
            dockerfile: Dockerfile.wine
            extra_tag: wine-debian-bookworm
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push (${{ matrix.variant.name }})
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.variant.dockerfile }}
          push: true
          platforms: linux/amd64
          tags: |
            ghcr.io/wolffileseu/gameserver:${{ matrix.variant.name }}
            ghcr.io/wolffileseu/gameserver:${{ matrix.variant.extra_tag }}
          cache-from: type=gha,scope=${{ matrix.variant.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.variant.name }}
